{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
    <div class="text-center mb-6">
        <h2 class="text-xl font-bold text-white">Start Attendance Session</h2>
        <p class="text-xs text-slate-400 mt-1">Select the parameters below to open the camera loop.</p>
    </div>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-xs font-semibold text-slate-400 mb-1">Select Class</label>
            <select name="class_name" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none text-sm">
                <option value="BCA_1st_Year">BCA 1st Year</option>
                <option value="BCA_2nd_Year">BCA 2nd Year</option>
                <option value="BCA_3rd_Year">BCA 3rd Year</option>
                <option value="BCA_6th_Sem_A">BCA 6th Sem A</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-400 mb-1">Select Subject</label>
            <select name="subject" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none text-sm">
                <option value="Python">Python</option>
                <option value="DBMS">DBMS</option>
                <option value="Networking">Networking</option>
                <option value="Java">Java</option>
                <option value="Environment_and_Ecology">Environment and Ecology</option>
                <option value="AI">AI</option>
                <option value="Major_Project">Major Project</option>
                <option value="Seminar_GD">Seminar and GD</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-400 mb-1">Select Time Slot</label>
            <select name="time_slot" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none text-sm font-mono">
                <option value="09:15 - 10:15">09:15 AM - 10:15 AM</option>
                <option value="10:15 - 11:15">10:15 AM - 11:15 AM</option>
                <option value="11:15 - 12:15">11:15 AM - 12:15 PM</option>
                <option value="12:15 - 01:15">12:15 PM - 01:15 PM</option>
                <option value="02:00 - 03:00">02:00 PM - 03:00 PM</option>
                <option value="03:00 - 04:00">03:00 PM - 04:00 PM</option>
                <option value="04:00 - 05:00">04:00 PM - 05:00 PM</option>
            </select>
        </div>
        <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg text-sm flex items-center justify-center gap-2 transition-all shadow-md">
            <span class="material-symbols-outlined text-sm">videocam</span> Launch Camera Scanner
        </button>
    </form>
</div>
{% endblock %}
