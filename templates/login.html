{% extends 'base.html' %}
{% block content %}
<div class="max-w-sm mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 sm:p-8 shadow-xl my-10">
    <div class="text-center mb-6">
        <h2 class="text-xl font-bold text-white">Student Login</h2>
        <p class="text-xs text-slate-400 mt-1">Enter your Roll Number below to see your attendance record history.</p>
    </div>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-xs font-semibold text-slate-400 mb-1">Roll Number</label>
            <input type="text" name="roll_id" required placeholder="e.g. 23bca028" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 font-mono text-sm">
        </div>
        <button type="submit" class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg text-sm mt-4 transition-all shadow-md">Check Attendance Summary</button>
    </form>
</div>
{% endblock %}
