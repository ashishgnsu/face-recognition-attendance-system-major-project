{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 sm:p-8 shadow-xl">
    <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
        <span class="material-symbols-outlined text-blue-500">fingerprint</span> Student Registration
    </h2>
    <form method="POST" id="regForm" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Full Name</label>
                <input type="text" name="name" required placeholder="Enter name" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500 text-sm">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Roll Number</label>
                <input type="text" name="roll_id" required placeholder="Enter roll number" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500 text-sm">
            </div>
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-400 mb-1">Select Class</label>
            <select name="class_name" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none text-sm">
                <option value="BCA_1st_Year">BCA 1st Year</option>
                <option value="BCA_2nd_Year">BCA 2nd Year</option>
                <option value="BCA_3rd_Year">BCA 3rd Year</option>
                <option value="BCA_6th_Sem_A">BCA 6th Sem A</option>
            </select>
        </div>
        <div class="space-y-3">
            <div class="relative bg-black rounded-xl overflow-hidden aspect-video border border-slate-800 flex items-center justify-center">
                <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                <canvas id="canvas" class="hidden"></canvas>
            </div>
            <button type="button" onclick="captureSnapshot()" class="w-full py-2.5 bg-slate-800 hover:bg-slate-700 text-white font-medium rounded-lg border border-slate-700 text-xs flex items-center justify-center gap-2 transition-all">
                <span class="material-symbols-outlined text-sm">photo_camera</span> Capture Face Photo
            </button>
        </div>
        <input type="hidden" name="image_data" id="image_data" required>
        <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg text-sm transition-all shadow-md">Register Now</button>
    </form>
</div>
<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const imageDataInput = document.getElementById('image_data');

    navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { alert("Camera connection error!"); });

    function captureSnapshot() {
        const context = canvas.getContext('2d');
        canvas.width = 640;
        canvas.height = 480;
        context.drawImage(video, 0, 0, 640, 480);
        imageDataInput.value = canvas.toDataURL('image/jpeg');
        alert("Face snapshot captured successfully!");
    }
</script>
{% endblock %}
