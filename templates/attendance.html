{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto text-center space-y-6">
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 flex flex-wrap items-center justify-between gap-4 text-left shadow-lg">
        <div>
            <h2 class="text-lg font-bold text-white">Class: <span class="text-blue-400 font-mono">{{ class_name.replace('_', ' ') }}</span> | Subject: <span class="text-blue-400 font-mono">{{ subject }}</span></h2>
        </div>
        <div class="text-emerald-400 text-xs font-bold font-mono px-3 py-1.5 bg-emerald-500/10 border border-emerald-500/20 rounded-lg">
            Active Slot: {{ time_slot }}
        </div>
    </div>
    
    <div class="relative inline-block bg-black border border-slate-800 rounded-2xl overflow-hidden shadow-2xl p-1 max-w-full">
        <img src="{{ url_for('video_feed', class_name=class_name, subject=subject, time_slot=time_slot) }}" class="rounded-xl object-contain w-full max-w-3xl aspect-video">
    </div>
    
    <div>
        <a href="/shutdown_session/{{ class_name }}/{{ subject }}/{{ time_slot }}" onclick="return confirm('Do you want to stop the camera and save attendance records?')" class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold text-sm rounded-lg transition-all shadow-md inline-block">
            Stop Session & Save Data
        </a>
    </div>
</div>
{% endblock %}
