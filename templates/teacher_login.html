{% extends 'base.html' %}
{% block content %}
<div class="max-w-sm mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 sm:p-8 shadow-xl my-10 relative overflow-hidden">
    <div class="text-center mb-6">
        <h2 class="text-xl font-bold text-white tracking-tight">Faculty Login Portal</h2>
        <p class="text-xs text-slate-400 mt-1">Only authorized teachers can access the management panel.</p>
    </div>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-xs font-semibold text-slate-400 mb-1">Username</label>
            <input type="text" name="username" required placeholder="admin" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 text-sm">
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-400 mb-1">Password</label>
            <input type="password" name="password" required placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 text-sm">
        </div>
        <button type="submit" class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg text-sm mt-4 transition-all shadow-md">Login as Teacher</button>
    </form>
</div>
{% endblock %}
